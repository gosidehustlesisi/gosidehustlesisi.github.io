<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Newsgroups — Per-Category Accuracy</title>
<script src="https://cdn.plot.ly/plotly-3.5.0.min.js"></script>
<style>
  body { margin: 0; background: #0a0e1a; font-family: 'Segoe UI', system-ui, sans-serif; }
  .chart-container { width: 100%; height: 100vh; }
  .chart-title { color: #f0f0f0; text-align: center; padding: 12px 0 0; font-size: 18px; font-weight: 600; }
  .chart-subtitle { color: #8b9bb4; text-align: center; padding: 4px 0 8px; font-size: 13px; }
</style>
</head>
<body>
<div class="chart-title">20 Newsgroups — Per-Category Recall (Accuracy)</div>
<div class="chart-subtitle">Naive Bayes classifier | 7,532 test samples across 20 categories</div>
<div id="chart" class="chart-container"></div>
<script>
(function() {
  const categories = [
    'alt.atheism','comp.graphics','comp.os.ms-win','comp.sys.ibm','comp.sys.mac',
    'comp.windows.x','misc.forsale','rec.autos','rec.motorcycles','rec.sport.baseball',
    'rec.sport.hockey','sci.crypt','sci.electronics','sci.med','sci.space',
    'soc.religion.christian','talk.politics.guns','talk.politics.mideast','talk.politics.misc','talk.religion.misc'
  ];

  const recall = [0.436,0.712,0.497,0.719,0.681,0.754,0.756,0.725,0.759,0.806,0.907,0.745,0.557,0.768,0.736,0.877,0.728,0.785,0.390,0.127];
  const precision = [0.519,0.601,0.695,0.599,0.724,0.801,0.819,0.747,0.749,0.907,0.594,0.751,0.676,0.833,0.780,0.516,0.569,0.822,0.624,0.552];
  const f1 = [0.474,0.652,0.580,0.654,0.701,0.777,0.787,0.736,0.754,0.853,0.718,0.748,0.611,0.799,0.757,0.650,0.639,0.803,0.480,0.207];
  const support = [319,389,394,392,385,395,390,396,398,397,399,396,393,396,394,398,364,376,310,251];

  const colors = recall.map(r => r >= 0.75 ? '#06b6d4' : r >= 0.50 ? '#f59e0b' : '#e74c3c');

  const data = [
    {
      x: categories,
      y: recall,
      type: 'bar',
      marker: {
        color: colors,
        line: { color: '#0a0e1a', width: 1 }
      },
      text: recall.map(v => (v * 100).toFixed(1) + '%'),
      textposition: 'outside',
      textfont: { color: '#f0f0f0', size: 10 },
      hovertemplate:
        '<b>%{x}</b><br>' +
        'Recall (Accuracy): <b>%{y:.1%}</b><br>' +
        'Precision: <b>%{customdata[0]:.1%}</b><br>' +
        'F1-Score: <b>%{customdata[1]:.3f}</b><br>' +
        'Test Samples: <b>%{customdata[2]}</b>' +
        '<extra></extra>',
      customdata: precision.map((p, i) => [p, f1[i], support[i]])
    }
  ];

  const layout = {
    paper_bgcolor: '#0a0e1a',
    plot_bgcolor: '#0a0e1a',
    font: { color: '#f0f0f0', family: 'Segoe UI, system-ui, sans-serif', size: 11 },
    xaxis: {
      title: { text: 'Newsgroup Category', font: { color: '#8b9bb4', size: 12 } },
      tickangle: -45,
      tickfont: { color: '#8b9bb4', size: 10 },
      gridcolor: '#1f2d44',
      zerolinecolor: '#1f2d44'
    },
    yaxis: {
      title: { text: 'Recall (Accuracy)', font: { color: '#8b9bb4', size: 12 } },
      tickformat: '.0%',
      range: [0, 1.05],
      tickfont: { color: '#8b9bb4', size: 10 },
      gridcolor: '#1f2d44',
      zerolinecolor: '#1f2d44'
    },
    margin: { l: 60, r: 30, t: 40, b: 140 },
    shapes: [
      { type: 'line', x0: -0.5, x1: 19.5, y0: 0.689, y1: 0.689,
        line: { color: '#f59e0b', width: 1.5, dash: 'dash' } }
    ],
    annotations: [
      { x: 19.5, y: 0.695, text: 'Overall Accuracy 68.9%',
        font: { color: '#f59e0b', size: 11 },
        showarrow: false, xanchor: 'right' }
    ],
    legend: { font: { color: '#8b9bb4' }, bgcolor: 'rgba(0,0,0,0)' }
  };

  Plotly.newPlot('chart', data, layout, { responsive: true });
})();
</script>
</body>
</html>
