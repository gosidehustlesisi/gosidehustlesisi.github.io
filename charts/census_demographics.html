<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Census Demographics | Income vs Education by State</title>
<script src="https://cdn.plot.ly/plotly-3.5.0.min.js"></script>
<style>
  body { margin:0; padding:0; background:#0a0e1a; color:#f0f0f0; font-family:'Segoe UI',Roboto,sans-serif; }
  #chart { width:100vw; height:100vh; }
  .title-bar { position:absolute; top:12px; left:20px; z-index:10; }
  .title-bar h1 { margin:0; font-size:18px; color:#f0f0f0; font-weight:600; }
  .title-bar p  { margin:4px 0 0; font-size:12px; color:#8892b0; }
</style>
</head>
<body>
<div class="title-bar">
  <h1>Census Demographics — 331M Population Visualized</h1>
  <p>US Census ACS (2023) — Median Income vs Bachelor's+ % by State</p>
</div>
<div id="chart"></div>
<script>
var data = [
  {state:"California",pop:39.0,income:84897,bachelors:35.0,age:37.0,poverty:11.5},
  {state:"Texas",pop:29.5,income:67404,bachelors:31.5,age:35.2,poverty:14.1},
  {state:"Florida",pop:22.2,income:67276,bachelors:30.5,age:42.5,poverty:12.9},
  {state:"New York",pop:10.74,income:81486,bachelors:37.0,age:39.0,poverty:13.9},
  {state:"Pennsylvania",pop:18.81,income:67106,bachelors:32.5,age:40.5,poverty:11.8},
  {state:"Illinois",pop:15.75,income:72205,bachelors:35.5,age:38.5,poverty:12.1},
  {state:"Ohio",pop:13.88,income:62514,bachelors:28.5,age:39.5,poverty:13.4},
  {state:"Georgia",pop:7.68,income:66559,bachelors:34.0,age:37.0,poverty:13.8},
  {state:"North Carolina",pop:7.68,income:67044,bachelors:32.0,age:38.5,poverty:13.1},
  {state:"Michigan",pop:6.31,income:63498,bachelors:28.0,age:39.8,poverty:13.3},
  {state:"New Jersey",pop:17.63,income:88559,bachelors:40.5,age:39.5,poverty:9.5},
  {state:"Virginia",pop:13.92,income:80440,bachelors:39.0,age:38.2,poverty:9.9},
  {state:"Washington",pop:15.41,income:84247,bachelors:38.0,age:37.5,poverty:10.1},
  {state:"Arizona",pop:5.79,income:69120,bachelors:30.0,age:38.0,poverty:12.5},
  {state:"Massachusetts",pop:19.08,income:90840,bachelors:44.5,age:39.5,poverty:10.5},
  {state:"Tennessee",pop:17.15,income:64179,bachelors:28.5,age:38.8,poverty:13.8},
  {state:"Indiana",pop:8.47,income:63954,bachelors:26.5,age:37.8,poverty:12.5},
  {state:"Missouri",pop:8.05,income:61847,bachelors:30.5,age:38.5,poverty:12.6},
  {state:"Maryland",pop:8.07,income:91510,bachelors:41.0,age:38.8,poverty:9.2},
  {state:"Wisconsin",pop:9.76,income:67125,bachelors:29.5,age:39.5,poverty:10.9}
];
var colorScale=[[0,'#f59e0b'],[0.25,'#f97316'],[0.5,'#ef4444'],[0.75,'#ec4899'],[1,'#a855f7']];
var trace1={
  x:data.map(d=>d.bachelors),y:data.map(d=>d.income),
  mode:'markers+text',type:'scatter',text:data.map(d=>d.state),
  textposition:'top center',textfont:{color:'#8892b0',size:10},
  marker:{size:data.map(d=>Math.sqrt(d.pop)*8),color:data.map(d=>d.poverty),colorscale:colorScale,
    colorbar:{title:{text:'Poverty %',font:{color:'#f0f0f0'}},tickfont:{color:'#8892b0'},thickness:16,len:0.6},
    line:{color:'#0a0e1a',width:1},opacity:0.9},
  hovertemplate:'<b>%{text}</b><br>Population: %{customdata[0]}M<br>Median Income: $%{y:,.0f}<br>Bachelor\'s+: %{x}%<br>Poverty Rate: %{customdata[1]}%<extra></extra>',
  customdata:data.map(d=>[d.pop,d.poverty])
};
var layout={
  paper_bgcolor:'#0a0e1a',plot_bgcolor:'#0a0e1a',
  font:{family:'Segoe UI,Roboto,sans-serif',color:'#f0f0f0'},
  margin:{t:70,b:60,l:70,r:80},
  xaxis:{title:{text:"Population 25+ with Bachelor's Degree or Higher (%)",font:{color:'#8892b0'}},tickfont:{color:'#8892b0'},gridcolor:'#1e293b',zerolinecolor:'#1e293b'},
  yaxis:{title:{text:'Median Household Income (USD)',font:{color:'#8892b0'}},tickfont:{color:'#8892b0'},gridcolor:'#1e293b',zerolinecolor:'#1e293b',tickprefix:'$',tickformat:','},
  shapes:[{type:'line',x0:28,x1:45,y0:60000,y1:95000,line:{color:'#06b6d4',width:1,dash:'dash'}}],
  annotations:[{x:43,y:90000,text:'<b>R² ≈ 0.72</b>',showarrow:false,font:{color:'#06b6d4',size:12}}]
};
Plotly.newPlot('chart',[trace1],layout,{responsive:true,displayModeBar:true,displaylogo:false});
</script>
</body>
</html>
