<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arXiv Paper Category Distribution</title>
<script src="https://cdn.plot.ly/plotly-3.5.0.min.js"></script>
<style>
  body { margin: 0; background: #0a0e1a; font-family: 'Segoe UI', system-ui, sans-serif; }
  .chart-container { width: 100%; height: 100vh; }
  .chart-title { color: #f0f0f0; text-align: center; padding: 12px 0 0; font-size: 18px; font-weight: 600; }
  .chart-subtitle { color: #8b9bb4; text-align: center; padding: 4px 0 8px; font-size: 13px; }
</style>
</head>
<body>
<div class="chart-title">arXiv Paper Category Distribution</div>
<div class="chart-subtitle">450 papers fetched from arXiv API (2024–2025) | cs.LG · cs.AI · cs.CL</div>
<div id="chart" class="chart-container"></div>
<script>
(function() {
  const categories = ['cs.LG (Machine Learning)', 'cs.AI (Artificial Intelligence)', 'cs.CL (Computation and Language)'];
  const counts = [150, 150, 150];
  const colors = ['#06b6d4', '#f59e0b', '#8b5cf6'];
  const descriptions = [
    'Learning theory, neural networks, deep learning, optimization, and general ML methods.',
    'Artificial intelligence: agents, reasoning, knowledge representation, planning, and search.',
    'Natural language processing: syntax, semantics, machine translation, LLMs, and text mining.'
  ];

  const data = [{
    values: counts,
    labels: categories,
    type: 'pie',
    hole: 0.45,
    marker: {
      colors: colors,
      line: { color: '#0a0e1a', width: 3 }
    },
    textinfo: 'label+percent',
    textposition: 'outside',
    textfont: { color: '#f0f0f0', size: 13 },
    hovertemplate:
      '<b>%{label}</b><br>' +
      'Papers: <b>%{value}</b><br>' +
      'Share: <b>%{percent}</b><br>' +
      '<span style="color:#8b9bb4">%{customdata}</span>' +
      '<extra></extra>',
    customdata: descriptions,
    pull: [0.02, 0.02, 0.02]
  }];

  const layout = {
    paper_bgcolor: '#0a0e1a',
    plot_bgcolor: '#0a0e1a',
    font: { color: '#f0f0f0', family: 'Segoe UI, system-ui, sans-serif', size: 12 },
    showlegend: true,
    legend: {
      orientation: 'h',
      y: -0.08,
      font: { color: '#8b9bb4', size: 12 },
      bgcolor: 'rgba(0,0,0,0)'
    },
    margin: { l: 40, r: 40, t: 60, b: 80 },
    annotations: [
      {
        text: '<b>450</b><br>Papers',
        x: 0.5, y: 0.5,
        font: { size: 18, color: '#f0f0f0' },
        showarrow: false
      }
    ]
  };

  Plotly.newPlot('chart', data, layout, { responsive: true });
})();
</script>
</body>
</html>
